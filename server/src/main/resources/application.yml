server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  application:
    name: demo-server
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.example.demo.modules.*.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

knife4j:
  enable: true
  setting:
    language: zh_cn

app:
  jwt:
    secret: change-me-please-this-must-be-at-least-32-bytes-long
    expire-seconds: 604800
    header: Authorization
    prefix: "Bearer "
  wx:
    miniapp:
      appid: your-appid
      secret: your-secret
    pay:
      mch-id: your-mch-id
      mch-key: your-mch-key
      notify-url: https://your-domain/api/pay/notify
